<!DOCTYPE html>
<html>
<head>
<title>NursingPreparation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Segoe UI; display:flex; background:#f5f7fb; }

/* Sidebar */
.sidebar {
  width:220px;
  background:#0d47a1;
  color:white;
  height:100vh;
  padding:20px;
  position:fixed;
}
.sidebar button {
  width:100%;
  margin:5px 0;
  padding:10px;
  border:none;
  background:#1565c0;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

/* Main */
.main {
  margin-left:240px;
  padding:20px;
  width:100%;
}

.card {
  background:white;
  padding:20px;
  margin-bottom:20px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button { margin:5px; padding:8px; border:none; border-radius:5px; cursor:pointer; }
</style>
</head>

<body>

<div class="sidebar">
<h2>🩺 NursingPrep</h2>
<button onclick="show('plan')">Plan</button>
<button onclick="show('progress')">Progress</button>
<button onclick="show('mock')">Mock</button>
<button onclick="show('videos')">Videos</button>
<button onclick="show('pdf')">PDF</button>
<button onclick="show('extra')">Advanced</button>
</div>

<div class="main">

<div id="plan" class="section">
<div class="card">
<h2>⏰ 3-Hour Plan</h2>
<p>2 hrs Study + 1 hr Mock</p>
<ul>
<li>Day1: Medical</li>
<li>Day2: Fundamentals</li>
<li>Day3: Pediatrics</li>
<li>Day4: Obstetrics</li>
<li>Day5: Mental</li>
<li>Day6: Pharma</li>
<li>Day7: Revision</li>
</ul>
</div>
</div>

<div id="progress" class="section" style="display:none;">
<div class="card">
<h2>📊 Subject Progress</h2>
<div id="subjectProgress"></div>
<p id="subPercent"></p>
</div>
</div>

<div id="mock" class="section" style="display:none;">
<div class="card">
<h2>🧪 Mock Test</h2>
<button onclick="startMock()">Start</button>
<p id="timer"></p>
<div id="mockBox"></div>
</div>
</div>

<div id="videos" class="section" style="display:none;">
<div class="card">
<h2>🎥 Add YouTube Videos</h2>
<input id="videoInput" placeholder="Paste link">
<button onclick="addVideo()">Add</button>
<div id="videoList"></div>
</div>
</div>

<div id="pdf" class="section" style="display:none;">
<div class="card">
<h2>📄 PDF</h2>
<a href="nursing.pdf" target="_blank"><button>Open PDF</button></a>
</div>
</div>

<div id="extra" class="section" style="display:none;">
<div class="card">
<h2>📅 Streak</h2>
<p id="streak"></p>
</div>

<div class="card">
<h2>🔔 Reminder</h2>
<button onclick="enableReminder()">Enable</button>
</div>
</div>

</div>

<script>

function show(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

let subjects=["Medical","Fundamentals","Pediatrics","Obstetrics","Mental","Pharma"];

function renderSubjects(){
  let c=document.getElementById("subjectProgress");
  c.innerHTML="";
  subjects.forEach(s=>{
    let checked=localStorage.getItem(s)=="true";
    c.innerHTML+=`<label><input type="checkbox" ${checked?"checked":""} onchange="saveSub('${s}',this.checked)"> ${s}</label><br>`;
  });
  updatePercent();
}

function saveSub(s,v){
  localStorage.setItem(s,v);
  updatePercent();
}

function updatePercent(){
  let done=0;
  subjects.forEach(s=>{ if(localStorage.getItem(s)=="true") done++; });
  let p=Math.round((done/subjects.length)*100);
  subPercent.innerText=p+"% completed";
}

let questions=[
{q:"Pulse?",opt:["60-100","120-150"],ans:0},
{q:"BP?",opt:["120/80","150/100"],ans:0}
];

let i=0,score=0,time=60;

function startMock(){
  i=0;score=0;time=60;
  nextQ(); runTimer();
}

function nextQ(){
  let q=questions[i];
  let html="<p>"+q.q+"</p>";
  q.opt.forEach((o,idx)=>{
    html+=`<button onclick="ans(${idx})">${o}</button>`;
  });
  mockBox.innerHTML=html;
}

function ans(x){
  if(x==questions[i].ans) score++;
  i++;
  if(i<questions.length) nextQ();
  else mockBox.innerHTML="Score: "+score;
}

function runTimer(){
  let t=setInterval(()=>{
    timer.innerText=time+" sec";
    time--;
    if(time<0){ clearInterval(t); mockBox.innerHTML="Time up"; }
  },1000);
}

let vids=JSON.parse(localStorage.getItem("vids"))||[];

function addVideo(){
  let l=videoInput.value.replace("watch?v=","embed/");
  vids.push(l);
  localStorage.setItem("vids",JSON.stringify(vids));
  showVideos();
}

function showVideos(){
  videoList.innerHTML="";
  vids.forEach(v=>{
    videoList.innerHTML+=`<iframe width=300 height=200 src="${v}"></iframe>`;
  });
}

function updateStreak(){
  let today=new Date().toDateString();
  let last=localStorage.getItem("last");
  let st=parseInt(localStorage.getItem("streak")||0);
  if(last!=today){
    st++; localStorage.setItem("streak",st);
    localStorage.setItem("last",today);
  }
  streak.innerText="🔥 "+st;
}

function enableReminder(){
  Notification.requestPermission().then(p=>{
    if(p=="granted"){
      setInterval(()=>{ new Notification("Study Reminder"); },3600000);
    }
  });
}

renderSubjects();
showVideos();
updateStreak();

</script>

</body>
</html>
